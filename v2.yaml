# yaml-language-server: $schema=https://raw.githubusercontent.com/CollegesChat/questionnaire/refs/heads/main/schema.json
- num: 1
  title: 如果您在主观题中留下了精彩见解，并希望在最终报告中获得署名，请留下您的常用网名/代号（留空则视为自愿以‘匿名受访者’身份参与开源共享）：[___________]
  type: fill_blank
  required: false
  prompt: "（1到4字）"
  blank_count: 1
  regex:
    - "^([\\u4e00-\\u9fa5]{1,4}|[a-zA-Z]{1,8})$"
- num: 2
  title: 你的学校是全称是？
  type: fill_blank
  required: true
  prompt:
  blank_count: 1
  regex:
    - "^.{4,12}$"
- num: 3
  title: 学信网验证（可选）
  type: fill_blank
  required: false
  prompt: 需前往学信网获取并填写验证码，程序将自动验证，并在最终问卷处标记。(此项数据不会对外公开可见，仅标注确认是否为本校学生)
  blank_count: 1
  regex:
    - "^[0-9]{12}|[0-9]{16}$"
- num: 4
  title: 你的入学年份及就读专业是什么？___年入学，专业为___
  type: fill_blank
  required: true
  prompt:
  blank_count: 2
  regex:
    - "^(201[0-9]|202[0-9])$"
    - "^.+$"
- num: 5
  title: 你的培养层次是？
  type: radio
  required: true
  prompt:
  options:
    - text: 大专
      has_additional: true
    - text: 本科
      has_additional: true
    - text: 硕士研究生
      has_additional: false
    - text: 博士研究生
      has_additional: false
- num: 6
  title: 你目前在哪一个校区就读？
  type: fill_blank
  required: true
  prompt:
  blank_count: 1
  regex:
    - "^.+$"
- num: 7
  title: 学校转专业容易吗？（可选）
  type: radio
  required: false
  prompt:
  options:
    - text: 很容易（门槛低/通过率高）
      has_additional: false
    - text: 一般（有绩点或人数限制）
      has_additional: false
    - text: 很难（考核严格/名额极少）
      has_additional: false
    - text: 政策不允许转专业
      has_additional: false
- num: 8
  title: 导师管理风格与组内学术氛围如何？
  type: fill_blank
  required: true
  prompt:
  blank_count: 1
  regex:
    - "^.{5,}$"
- num: 9
  title: 实验室与工位硬件条件如何？
  type: fill_blank
  required: true
  prompt:
  blank_count: 1
  regex:
    - "^.{5,}$"
- num: 10
  title: 研究生的补助与福利待遇大概在什么水平？
  type: fill_blank
  required: true
  prompt:
  blank_count: 1
  regex:
    - "^.+$"
- num: 11
  title: 是否存在“异地研究院/分院/校外基地”联培情况？生存现状如何？（没有请跳过）
  type: fill_blank
  required: false
  prompt: |-
    提示：如果你被导师或学校安排到了本部以外的“外地研究院”、“校外科研基地”或“产业园联培”（比如本校在西安，但你被送到了深圳/苏州研究院），请聊聊那边的生存现状。

    可以围绕以下几点吐槽或夸奖：
    1. 交通与生活：是不是周围荒无人烟，进城极难？外卖送不送？
    2. 补助待遇：异地有没有额外的差旅补贴或生活津贴？
    3. 神仙还是流放：是避开了本部领导查寝、过得更自由？还是像个被学校遗忘的编外打工人，办事盖章极其麻烦？
  blank_count: 1
  regex:
    - "^.*$"
- num: 12
  title: 宿舍的床位结构是怎样的？
  type: checkbox
  required: true
  prompt: 请选择上面的两项中的其中一项、下面四项其中的一项。如果有混合的情况，请勾选多个。
  options:
    - text: 上床下桌
      has_additional: true
    - text: 上下铺
      has_additional: true
    - text: 四人间
      has_additional: true
    - text: 六人间
      has_additional: true
    - text: 八人间
      has_additional: true
    - text: 八人间或者更多 / 看交的钱
      has_additional: true
- num: 13
  title: 教室和宿舍有空调吗？
  type: checkbox
  required: true
  prompt:
  options:
    - text: 教室有
      has_additional: true
    - text: 宿舍有
      has_additional: true
- num: 14
  title: 宿舍有独立卫浴吗？
  type: checkbox
  required: true
  prompt:
  options:
    - text: 有独卫
      has_additional: true
    - text: 有独浴
      has_additional: true
    - text: 完全没有
      has_additional: true
- num: 15
  title: 宿舍允许挂遮光床帘吗？
  type: radio
  required: true
  prompt:
  options:
    - text: 允许挂床帘
      has_additional: false
    - text: 表面禁止但私下挂没人管
      has_additional: false
    - text: 严查，一经发现强制拆除
      has_additional: false
    - text: 看宿管心情和查寝严格度
      has_additional: false
- num: 16
  title: 宿舍楼的洗衣机配置如何？
  type: fill_blank
  required: true
  prompt:
  blank_count: 1
  regex:
    - "^.+$"
- num: 17
  title: 每天会断电断网吗？
  type: checkbox
  required: false
  prompt: 如果不断电也不断网可直接跳过
  options:
    - text: 断电
      has_additional: true
    - text: 断网
      has_additional: true
- num: 18
  title: 宿舍的限电功率是多少？会没收违禁电器吗 / 查违章电器严不严？（可选）
  type: fill_blank
  required: false
  prompt: 不知道请跳过。
  blank_count: 1
  regex:
    - "^.*[\\u4e00-\\u9fa5]+.*$"
- num: 19
  title: 大一刚入学允许带电脑吗？
  type: radio
  required: true
  prompt:
  options:
    - text: 允许带电脑
      has_additional: false
    - text: 明确禁止带电脑
      has_additional: false
    - text: 表面不允许但带了也没人管
      has_additional: false
- num: 20
  title: 晚上宿舍会查寝或封寝吗？
  type: radio
  required: true
  prompt:
  options:
    - text: 既严格查寝又按时封寝
      has_additional: true
    - text: 只封寝不查寝
      has_additional: true
    - text: 偶尔查寝但不封寝
      has_additional: false
    - text: 完全不管（无门禁无查寝）
      has_additional: false
- num: 21
  title: 食堂的价格与卫生质量如何？
  type: fill_blank
  required: true
  prompt:
  blank_count: 1
  regex:
    - "^.{5,}$"
- num: 22
  title: 校园网的收费和网络质量如何？
  type: fill_blank
  required: true
  prompt:
  blank_count: 1
  regex:
    - "^.+$"
- num: 23
  title: 校园内用什么卡消费？
  type: checkbox
  required: true
  prompt:
  options:
    - text: 实体校园卡
      has_additional: false
    - text: 手机虚拟校园码
      has_additional: false
    - text: 微信或支付宝直刷
      has_additional: false
    - text: 银行联名卡
      has_additional: false
    - text: 其他
      has_additional: true
- num: 24
  title: 学校的快递收发政策怎么样？
  type: fill_blank
  required: true
  prompt: 能发哪些快递？快递点离宿舍多远？快递点上下班时间？
  blank_count: 1
  regex:
    - "^.+$"
- num: 25
  title: 校园内超市的物价和服务怎么样？
  type: checkbox
  required: true
  prompt:
  options:
    - text: 物价偏高（比校外贵不少）
      has_additional: false
    - text: 物价正常（与校外基本持平）
      has_additional: false
    - text: 物价偏低（与校外便宜）
      has_additional: false
    - text: 种类多
      has_additional: false
    - text: 种类正常（与校外基本持平）
      has_additional: false
    - text: 种类少
      has_additional: false
- num: 26
  title: 学校允许点外卖吗？
  type: radio
  required: true
  prompt:
  options:
    - text: 允许，外卖员可以送至宿舍楼下
      has_additional: false
    - text: 可以点，但只能去校门口/外卖柜/指定地点拿
      has_additional: true
    - text: 严禁点外卖，抓到会通报或没收
      has_additional: false
- num: 27
  title: 校园内可以骑私家电瓶车吗？
  type: radio
  required: true
  prompt:
  options:
    - text: 可以自由骑行和充电
      has_additional: true
    - text: 可以骑，但限制很多或需要办牌照
      has_additional: true
    - text: 严禁学生骑行和停放私家电瓶车
      has_additional: false
- num: 28
  title: 校内共享单车的数量与种类如何？
  type: radio
  required: true
  prompt:
  options:
    - text: 车很多且种类丰富，很好骑
      has_additional: false
    - text: 数量较少，早高峰基本靠抢
      has_additional: false
    - text: 校内完全没有共享单车
      has_additional: false
- num: 29
  title: 学校周边的交通便利度如何？
  type: radio
  required: true
  prompt: 包括是否偏僻，和主城区是否远等。
  options:
    - text: 极好，校门口或步行距离内有地铁站
      has_additional: false
    - text: 一般，需要坐公交车转乘地铁
      has_additional: true
    - text: 偏僻，进城单程需要一小时以上
      has_additional: true
- num: 30
  title: 日常考勤管理严格吗？
  type: checkbox
  required: true
  prompt:
  options:
    - text: 有强制早自习
      has_additional: true
    - text: 有强制晚自习
      has_additional: true
    - text: 有晨跑/早起签到/早操/升旗要求
      has_additional: true
    - text: 都没有，日常考勤很自由
      has_additional: true
- num: 31
  title: 每学期跑步打卡的要求是多少公里？（可选，没有请跳过）
  type: fill_blank
  required: false
  prompt: 以及是否能用自行车/滑板车“刷”跑步App数据？
  blank_count: 1
  regex:
    - "^.+$"
- num: 32
  title: 寒暑假一般放多久？有小学期吗？有的话是多长？
  type: fill_blank
  required: true
  prompt:
  blank_count: 1
  regex:
    - "^.+$"
- num: 33
  title: 自习资源和图书馆体验如何？
  type: fill_blank
  required: true
  prompt: 以及学校是否有24小时开放的通宵自习室？
  blank_count: 1
  regex:
    - "^.{5,}$"
- num: 34
  title: 自由补充
  type: text_area
  required: false
  prompt:
